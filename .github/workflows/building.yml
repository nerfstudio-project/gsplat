name: Build Wheels

on: [workflow_call, workflow_dispatch]
jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Strip unsupported tags in README
        run: |
          sed -i '/<!-- pypi-strip -->/,/<!-- \/pypi-strip -->/d' README.md
      - name: Prepare source distribution build
        run: |
          python -m pip install build
          rm -rf dist
          mkdir -p dist
      - name: Build sdist
        run: |
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: pypi_packages
          path: dist/*.tar.gz
          if-no-files-found: error

  build_wheels:
    runs-on: ${{ matrix.os }}
    environment: production
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: "2"
      CMAKE_PRESET: full-release

    strategy:
      fail-fast: false
      matrix:
        # Native wheel builds currently target Linux.
        os: [ubuntu-22.04]
        python-version: ['3.10']
        # Last 3 minor PyTorch versions aligned with pytorch.org
        torch-version: ['2.8.0', '2.9.1', '2.10.0']
        # CUDA versions aligned with PyTorch build matrix
        cuda-version: ['cu126', 'cu128', 'cu129', 'cu130']
        exclude:
          # PyTorch 2.8.0 does not ship cu130 wheels
          - torch-version: '2.8.0'
            cuda-version: 'cu130'
          # PyTorch 2.9.1 does not ship cu129 wheels
          - torch-version: '2.9.1'
            cuda-version: 'cu129'
          # PyTorch 2.10.0 does not ship cu129 wheels
          - torch-version: '2.10.0'
            cuda-version: 'cu129'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Free up disk space
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          echo "Disk space after cleanup:"
          df -h
        shell: bash

      - name: Install CUDA ${{ matrix.cuda-version }}
        if: ${{ matrix.cuda-version != 'cpu' }}
        run: |
          bash .github/workflows/cuda/${{ runner.os }}.sh ${{ matrix.cuda-version }}
        shell: bash

      - name: Install PyTorch ${{ matrix.torch-version }}+${{ matrix.cuda-version }}
        run: |
          pip install torch==${{ matrix.torch-version }} --extra-index-url https://download.pytorch.org/whl/${{ matrix.cuda-version }}
          python -c "import torch; print('PyTorch:', torch.__version__)"
          python -c "import torch; print('CUDA:', torch.version.cuda)"
          python -c "import torch; print('CUDA Available:', torch.cuda.is_available())"
        shell: bash

      - name: Set version
        if: ${{ runner.os != 'macOS' }}
        run: |
          VERSION=`sed -n 's/^__version__ = "\(.*\)"/\1/p' gsplat/version.py`
          TORCH_VERSION=`echo "pt${{ matrix.torch-version }}" | sed "s/..$//" | sed "s/\.//g"`
          CUDA_VERSION=`echo ${{ matrix.cuda-version }}`
          echo "New version name: $VERSION+$TORCH_VERSION$CUDA_VERSION"
          sed -i "s/$VERSION/$VERSION+$TORCH_VERSION$CUDA_VERSION/" gsplat/version.py
        shell: bash

      - name: Install build dependencies
        run: |
          # https://github.com/pypa/setuptools/issues/5174, pkg_resources is removed in setuptools 82 but we need it for older torch versions
          python -m pip install --upgrade "setuptools<82"
          python -m pip install build "cmake>=3.26" ninja "scikit-build-core>=1.0"
        shell: bash

      - name: Prepare wheel build
        run: |
          source .github/workflows/cuda/${{ runner.os }}-env.sh ${{ matrix.cuda-version }}

          # Make the selected toolkit available to subsequent GitHub steps.
          printf '%s\n' \
            "CUDA_HOME=${CUDA_HOME}" \
            "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}" \
            >> "$GITHUB_ENV"
          printf '%s\n' "${CUDA_HOME}/bin" >> "$GITHUB_PATH"

          rm -rf dist "$RUNNER_TEMP/gsplat-sdist"
          mkdir -p dist "$RUNNER_TEMP/gsplat-sdist"
        shell: bash

      - name: Build wheel from sdist
        run: |
          python -m build --sdist --outdir dist
          tar \
            --extract \
            --gzip \
            --file dist/*.tar.gz \
            --directory "$RUNNER_TEMP/gsplat-sdist" \
            --strip-components=1

          cd "$RUNNER_TEMP/gsplat-sdist"
          # scikit-build-core drives the single CMake configure and build:
          # - cmake.args=--preset keeps the preset as the one source of build
          #   config
          # - cmake.build-type is emptied so scikit-build-core's Release
          #   default cannot override the preset's CMAKE_BUILD_TYPE
          # - distribution wheels ship without the test payload; the
          #   GPU-backed CI pipeline validates test-carrying wheels
          python -m pip wheel \
            --verbose \
            --no-build-isolation \
            --no-deps \
            --wheel-dir dist \
            --config-settings=build-dir="build/${CMAKE_PRESET}" \
            --config-settings=cmake.build-type= \
            --config-settings=cmake.args=--preset="${CMAKE_PRESET}" \
            --config-settings=cmake.define.GSPLAT_BUILD_TESTS=OFF \
            --config-settings=cmake.define.GSPLAT_TESTS_FORCE_CUDA=OFF \
            .
          mv dist/*.whl "$GITHUB_WORKSPACE/dist/"
        shell: bash

      - name: Smoke-test wheel
        run: |
          wheel_file=$(realpath dist/*.whl)
          test_dir="$RUNNER_TEMP/gsplat-wheel-test"
          rm -rf "$test_dir"
          mkdir -p "$test_dir"
          cd "$test_dir"

          if python -m pip show gsplat >/dev/null 2>&1; then
            python -m pip uninstall --yes gsplat
          fi
          python -m pip install "${wheel_file}"
          python -c "import gsplat; print('gsplat:', gsplat.__version__, gsplat.__file__)"

          # Distribution wheels must not ship the test payload, while the
          # static gsplat-test entry point stays importable without it.
          if unzip -Z1 "$wheel_file" | grep -F _testdata; then
              echo "distribution wheel ships test payload entries" >&2
              exit 1
          fi
          python -c "import gsplat._test"
          echo "wheel manifest: no test payload; gsplat._test importable"

          python -m pip install "${wheel_file}[lidar]"
          python -c "from scipy.spatial import cKDTree; print('scipy OK')"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          # Include unique matrix values to avoid name collisions.
          name: compiled_wheels_python${{ matrix.python-version }}-${{ matrix.os }}-${{ matrix.torch-version }}-${{ matrix.cuda-version }}
          path: dist/*.whl
          if-no-files-found: error
