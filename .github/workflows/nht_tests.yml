name: NHT Tests

# Builds gsplat with CUDA (so the NHT CUDA kernels actually compile) and runs
# the NHT-specific pytest suite. ``core_tests.yml`` builds with BUILD_NO_CUDA=1
# and skips every CUDA-gated test in ``tests/test_nht.py``, so this workflow is
# what actually exercises the NHT delta.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nht_tests:
    name: NHT tests (${{ matrix.os }}, ${{ matrix.cuda-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022]
        python-version: ['3.10']
        torch-version: ['2.9.1']
        cuda-version: ['cu128', 'cu130']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Free up disk space
        if: ${{ runner.os == 'Linux' }}
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          echo "Disk space after cleanup:"
          df -h
        shell: bash

      - name: Install CUDA ${{ matrix.cuda-version }}
        run: |
          bash .github/workflows/cuda/${{ runner.os }}.sh ${{ matrix.cuda-version }}
        shell: bash

      - name: Install PyTorch ${{ matrix.torch-version }}+${{ matrix.cuda-version }}
        run: |
          pip install torch==${{ matrix.torch-version }} --extra-index-url https://download.pytorch.org/whl/${{ matrix.cuda-version }}
          python -c "import torch; print('PyTorch:', torch.__version__)"
          python -c "import torch; print('CUDA:', torch.version.cuda)"
          python -c "import torch; print('CUDA Available:', torch.cuda.is_available())"
        shell: bash

      - name: Install build and test dependencies
        run: |
          # setuptools<82 because pkg_resources is needed by older torch versions
          # (mirrors building.yml).
          pip install --upgrade "setuptools<82"
          pip install ninja pytest
        shell: bash

      - name: Build and install gsplat[nht] with NHT CUDA kernels (+ tinycudann)
        env:
          # Step-level env so Windows Python sees CUDA_HOME explicitly
          # (mirrors building.yml's `Build wheel` step).
          CUDA_HOME: ${{ runner.os == 'Windows' && (matrix.cuda-version == 'cu130' && 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.0' || matrix.cuda-version == 'cu129' && 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.9' || matrix.cuda-version == 'cu128' && 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.8' || 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.6') || '' }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="${CUDA_HOME}/bin:${PATH}"
            export TORCH_CUDA_ARCH_LIST="7.5;8.0;8.6;9.0"
          else
            source .github/workflows/cuda/${{ runner.os }}-env.sh ${{ matrix.cuda-version }}
          fi
          # tinycudann wants archs without the decimal point (e.g. "75;80;86;90"
          # rather than "7.5;8.0;8.6;9.0"). Strip the trailing "+PTX" if present
          # and drop the dots; keep the same arch coverage as TORCH_CUDA_ARCH_LIST.
          export TCNN_CUDA_ARCHITECTURES="$(echo "${TORCH_CUDA_ARCH_LIST%+PTX}" | sed 's/\.//g')"
          echo "TORCH_CUDA_ARCH_LIST=${TORCH_CUDA_ARCH_LIST}"
          echo "TCNN_CUDA_ARCHITECTURES=${TCNN_CUDA_ARCHITECTURES}"
          # NHT kernels must compile: do NOT set BUILD_NO_CUDA. The [nht] extra
          # pulls in tinycudann from git so the DeferredShaderModule tests in
          # tests/test_nht.py can also collect/import.
          MAX_JOBS=2 pip install --no-build-isolation ".[nht]"
          python -c "import gsplat; print('gsplat:', gsplat.__version__)"
          python -c "import tinycudann as tcnn; print('tinycudann OK')"
        shell: bash

      - name: Run NHT tests
        run: |
          # On these CPU-only runners every @skipif(not torch.cuda.is_available())
          # test will be skipped; -rs surfaces the skip reasons so it's obvious
          # what ran vs. what was deferred to a GPU runner. The build above is
          # what catches NHT regressions; pytest also verifies that the freshly
          # built extension imports cleanly and that the Python wrapper layer
          # in gsplat.nht still collects.
          pytest tests/test_nht.py -v --tb=short -rs
        shell: bash
