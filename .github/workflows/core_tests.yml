name: Core Tests.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install 'tomli>=1.2'
          bash .github/workflows/cuda/Linux.sh cu126
          pip install torch==2.9.1 --extra-index-url https://download.pytorch.org/whl/cu126
          # Provision the complete declared development environment without
          # building gsplat before the explicit CMake step below.
          ./bootstrap.sh --python python --cuda 12.6
      - name: Code Formatting Check
        run: lint/format-code.sh --check --full
      - name: Build Extension
        run: |
          source .github/workflows/cuda/Linux-env.sh cu126
          # Tests need only one portable architecture and the reduced CI channel set.
          cmake --preset ci-release -B build/ -DGSPLAT_TESTS_FORCE_CUDA=OFF
          cmake --build build/
      - name: Run CTest Tests
        run: ctest --test-dir build/ --output-on-failure
