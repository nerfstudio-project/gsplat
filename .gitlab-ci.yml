variables:
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_CLEAN_FLAGS: -ffdx -e .ci-keep
  FF_TIMESTAMPS: true # Enable timestamps in job logs

include:
  - config.yaml

workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    # Those rules follow this logic:
    # Phase 1: No open merge request, user pushes to a branch: --> Run branch pipeline
    # Phase 2: Open merge request: --> Do not run branch pipeline, but run merge result pipeline
    # Phase 3: Open merge request, user pushes to the branch: --> Re-run merge result pipeline
    # Phase 4: Branch is merged into protected branch: --> Run branch pipeline
    #
    # Additionally we do not allow auto-cancel of outdated pipelines on protected branches, we want to collect all
    # possible data points on these post-merge pipelines.
    - if: $CI_COMMIT_REF_PROTECTED == "true" # Run branch pipeline on protected branches (main or release)
      auto_cancel:
        on_new_commit: none
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" # Run merge request or merge result pipelines (if merge result pipelines are configured in gitlab)
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE != "web" # Do not run branch pipelines if merge request is open, but still allow web use
      when: never
    - if: $CI_COMMIT_BRANCH # Run branch pipelines for all branches when triggered by a branch push and no merge request is open
      auto_cancel:
        on_new_commit: none

stages:
  - lint
  - build
  - test
  - docs
  - deploy

default:
  image: ${DOCKER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
  interruptible: true

code-format:
  stage: lint

  variables:
    GIT_SUBMODULE_STRATEGY: none

  tags:
    - type/docker
    - os/linux
    - arch/x86_64

  script:
    - lint/format-code.sh --check --full

.build-base:
  stage: build

  tags:
    - type/docker
    - os/linux
    - arch/x86_64

  before_script:
    # Configure the persistent caches using CI_BUILDS_DIR.
    - source /etc/profile.d/00-persistent-cache.sh
    - rm -rf dist
    - mkdir -p dist

  script:
    # scikit-build-core drives the single CMake configure and build:
    # - cmake.args=--preset keeps the preset as the one source of build config
    # - cmake.build-type is emptied so scikit-build-core's Release default
    #   cannot override the preset's CMAKE_BUILD_TYPE
    # - the second cmake.args entry records configure/build traces, published
    #   as job artifacts next to the wheel
    - |
      python -m pip wheel \
        --verbose \
        --no-build-isolation \
        --no-deps \
        --wheel-dir dist \
        --config-settings=build-dir="build/${CMAKE_PRESET}" \
        --config-settings=build.verbose=true \
        --config-settings=cmake.build-type= \
        --config-settings=cmake.args=--preset="${CMAKE_PRESET}" \
        --config-settings=cmake.args=-DGSPLAT_ENABLE_BUILD_TRACES=ON \
        .

  artifacts:
    name: "gsplat-wheel-${CI_JOB_NAME}-${CI_COMMIT_SHORT_SHA}"
    expire_in: 1 week
    paths:
      - dist/*.whl
      - build/${CMAKE_PRESET}/*-trace.json

build-debug:
  extends: .build-base
  variables:
    CMAKE_PRESET: ci-debug

build-release:
  extends: .build-base
  variables:
    CMAKE_PRESET: ci-release

.test-base:
  stage: test

  variables:
    GIT_STRATEGY: empty
    GIT_SUBMODULE_STRATEGY: none
    # Optional pytest marker expression to narrow test selection (empty = all).
    PYTEST_MARKER_EXPR: ""

  tags:
    - type/docker
    - os/linux
    - arch/x86_64
    - gpu

  before_script:
    - nvidia-smi -L
    - nvidia-smi
    # Free up local disk space if filled up by cache
    - |
      # Check if $HOME disk usage is over 90%
      USAGE=$(df "$HOME" | awk 'NR==2 {print $5}' | sed 's/%//')
      if [ "$USAGE" -gt 90 ]; then
        echo "Running low on disk space, $USAGE% full. Cleaning disk-cache."
        rm -rf "$CI_BUILDS_DIR/.ci-keep"
      fi
      df -h "$HOME" | awk 'NR==2 {print "Disk usage now: "$3" used of "$2", "$5" full"}'
    # Configure the persistent caches after any disk cleanup above.
    - source /etc/profile.d/00-persistent-cache.sh
    # Determine GPU architecture of current CI machine.
    - CUDA_ARCH=$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader,nounits | head -1)
    - echo "Determined CUDA Architecture ${CUDA_ARCH}"

    # Apply the optional marker (PYTEST_MARKER_EXPR) via PYTEST_ADDOPTS, which
    # pytest shlex-parses so the quoted expression survives.
    - |
      if [ -n "${PYTEST_MARKER_EXPR}" ]; then
        export PYTEST_ADDOPTS="${PYTEST_ADDOPTS:-} -m '${PYTEST_MARKER_EXPR}'"
      fi

  script:
    - |
      wheel_file=$(realpath dist/*.whl)
      test_root="${CI_PROJECT_DIR}/build/wheel-test/${CI_JOB_NAME}"
      rm -rf "${test_root}"
      mkdir -p "${test_root}"
      cd "${test_root}"

      if python -m pip show gsplat >/dev/null 2>&1; then
        python -m pip uninstall --yes gsplat
      fi
      python -m pip install "${wheel_file}[test]"
      python -c "import gsplat; print('gsplat:', gsplat.__version__, gsplat.__file__)"
      gsplat-test

test-debug:
  extends: .test-base
  needs:
    - job: build-debug
      artifacts: true
  variables:
    # gradcheck is build-mode-independent and test-release runs it in full, so
    # re-running it under the -O0 debug build adds no coverage.
    PYTEST_MARKER_EXPR: "not gradcheck"

test-release:
  extends: .test-base
  needs:
    - job: build-release
      artifacts: true

# Source-tree checks need no compiled binaries and no GPU: the workflow
# configures and runs only the tests labeled "source".
test-source:
  stage: test
  needs: []

  tags:
    - type/docker
    - os/linux
    - arch/x86_64

  before_script:
    - source /etc/profile.d/00-persistent-cache.sh

  script:
    - |
      cmake \
        --workflow \
        --preset source-checks

render-docs:
  stage: docs

  # Render as soon as lint passes; rendering doesn't depend on the test stage.
  needs:
    - code-format

  variables:
    GIT_SUBMODULE_STRATEGY: none

  tags:
    - type/docker
    - os/linux
    - arch/x86_64

  script:
    - bash docs/render_docs.sh build/html

  artifacts:
    name: "docs-${CI_COMMIT_SHORT_SHA}"
    expose_as: "Rendered documentation"
    paths:
      - build/html/
    when: always

# Publish the rendered documentation to GitLab Pages on nv/main only. Reuses
# the render-docs artifact rather than rendering again.
pages:
  stage: deploy

  # Minimal image — this job only relocates files; no build/render here.
  image: alpine:3.24.0

  tags:
    - type/docker
    - os/linux
    - arch/x86_64

  rules:
    - if: $CI_COMMIT_BRANCH == "nv/main"

  needs:
    - render-docs

  script:
    - mv build/html public

  artifacts:
    paths:
      - public
